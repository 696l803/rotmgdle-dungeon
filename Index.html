<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RotMGDLE – Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root { --gold: #ffcc00; }

* { box-sizing: border-box; }

body {
  font-family: 'Press Start 2P', system-ui;
  background: linear-gradient(#1a1a2e, #0f0f1f);
  color: #eee;
  margin: 0;
  padding: 40px 20px;
  text-align: center;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold);
  font-size: 3.2rem;
  margin: 0 0 60px 0;
  letter-spacing: 4px;
}

.game-container {
  max-width: 520px;           /* Cadre réduit et élégant pour PC */
  width: 100%;
  background: #16213e;
  border: 5px solid var(--gold);
  border-radius: 20px;
  padding: 50px 40px;
  box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
}

.menu-links {
  display: flex;
  flex-direction: column;
  gap: 38px;
  font-size: 1.65rem;
}

.menu-link {
  text-decoration: none;
  color: #eee;
  padding: 14px 0;
  transition: all 0.25s ease;
  letter-spacing: 2px;
}

.menu-link:hover {
  color: var(--gold);
  text-shadow: 0 0 15px var(--gold);
  transform: scale(1.07);
}

/* Légère adaptation pour écrans très larges */
@media (min-width: 1400px) {
  .game-container {
    max-width: 560px;
  }
}
</style>
</head>

<body>

<h1>ROTMGDLE</h1>

<div class="game-container">

  <div class="menu-links">
    <a href="rotmgdle-item.html" class="menu-link">
      ✏️ ITEMS ✏️
    </a>

    <a href="rotmgdle-dungeon.html" class="menu-link">
      🏰 DUNGEON 🏰
    </a>

    <a href="#" class="menu-link">
      🎵 MUSIC 🎵
    </a>
  </div>

</div>

<script type="module" src="./realtime.js"></script>


</body>
</html>
