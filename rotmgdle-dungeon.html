<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RotMGDLE – Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root { --gold:#ffcc00; }
* { box-sizing:border-box; }

body{
  font-family:'Press Start 2P', system-ui;
  background:linear-gradient(#1a1a2e,#0f0f1f);
  color:#eee;
  margin:0;
  padding:16px;
  text-align:center;
}

h1{
  color:var(--gold);
  text-shadow:0 0 15px var(--gold);
}

.subtitle{color:#aaa;margin-bottom:20px;}

.game-container{
  max-width:1400px;
  margin:auto;
  background:#16213e;
  border:4px solid var(--gold);
  border-radius:12px;
  padding:20px;
}

.grid,.row{
  display:grid;
  grid-template-columns:140px 14% 10% 14% 22% 12% 12%;
  gap:10px;
}

.header{
  background:#0f3460;
  color:var(--gold);
  padding:12px 10px 12px 18px;
  border:2px solid #444;
  letter-spacing:1.5px;
  font-size:12px;
  text-shadow:0 0 4px #000;
  text-align:left;
}

.row > div {
  padding-left:12px;
  text-align:left;
}

.row{margin:6px 0;}

.portal{
  background:#1e2937;
  border:3px solid #555;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding-left:12px;
}

.portal-img {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
}

.cell{
  background:#1e2937;
  border:3px solid #555;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding-left:12px;
  color:#fff;
  transform:scaleY(0);
  opacity:0;
}

.cell.reveal{animation:flip .4s forwards;}
@keyframes flip{to{transform:scaleY(1);opacity:1;}}

.green{background:#22c55e;color:#000;}
.gray{background:#64748b;}
.orange{background:#f59e0b;color:#000;}

.arrow-up::after{content:" ▲";color:#22c55e;}
.arrow-down::after{content:" ▼";color:#ef4444;}

input{
  flex:1;
  padding:14px;
  border:3px solid var(--gold);
  background:#1e2937;
  color:#eee;
  border-radius:8px;
}

button{
  font-family:'Press Start 2P';
  padding:14px 20px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.daily-btn {
  background:#f59e0b !important;
  color:#000;
}

.daily-btn.active {
  background:#22c55e !important;
}
</style>
</head>

<body>

<h1>ROTMGDLE</h1>
<div class="subtitle">Dungeon Mode</div>

<div class="game-container">

<div class="grid">
  <div class="header">PORTAL</div>
  <div class="header">DIFF</div>
  <div class="header">BOSS</div>
  <div class="header">TREASURE</div>
  <div class="header">POTS</div>
  <div class="header">DATE</div>
  <div class="header">SIZE</div>
</div>

<div id="history"></div>

<div style="display:flex;gap:10px;margin-top:15px;">
  <input id="dungeon-input" list="dungeon-list">
  <button onclick="submitGuess()">GUESS</button>
</div>

<div style="margin-top:15px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
  <input id="seed-input" placeholder="Enter seed (optional)" style="width:260px;padding:10px;">
  <button onclick="applySeed()">Set Seed</button>
  <button id="daily-btn" class="daily-btn" onclick="toggleDailyMode()">Daily Mode</button>
</div>

<datalist id="dungeon-list"></datalist>

<div id="message" style="margin-top:15px;color:#22c55e;"></div>
<button id="new-game-btn" style="display:none;margin-top:15px;" onclick="newGame()">PLAY AGAIN</button>

</div>

<script>
function normalize(v){return v.toLowerCase().replace(/’/g,"'").trim();}

function hashSeed(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31,h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

// Fonction pour générer un seed journalier basé sur la date
function getDailySeed() {
  const today = new Date();
  const dateStr = today.getFullYear() + '-' + 
                  String(today.getMonth()+1).padStart(2,'0') + '-' + 
                  String(today.getDate()).padStart(2,'0');
  return hashSeed(dateStr);
}

const sizeOrder = { "Arena":1, "Short":2, "Medium":3, "Long":4 };

function compare(a, b, isPots = false) {
  const A = normalize(a);
  const B = normalize(b);

  if (!isPots) {
    if (!isNaN(A) && !isNaN(B)) {
      if (Number(A) === Number(B)) return "green";
      return Number(A) < Number(B) ? "arrow-up" : "arrow-down";
    }
    if (sizeOrder[a] && sizeOrder[b]) {
      if (sizeOrder[a] === sizeOrder[b]) return "green";
      return sizeOrder[a] < sizeOrder[b] ? "arrow-up" : "arrow-down";
    }
    return A === B ? "green" : "gray";
  }

  if (A === B) return "green";

  const allMinor = ["att", "def", "dex", "spd", "vit", "wis"];
  const targetPots = B.split(",").map(s => s.trim().toLowerCase());
  const guessPots  = A.split(",").map(s => s.trim().toLowerCase());

  if (targetPots.length === 6 && allMinor.every(p => targetPots.includes(p))) {
    return guessPots.some(p => allMinor.includes(p)) ? "orange" : "gray";
  }

  return guessPots.some(p => targetPots.includes(p)) ? "orange" : "gray";
}

function toggleDailyMode() {
  isDailyMode = !isDailyMode;
  const btn = document.getElementById("daily-btn");
  if (isDailyMode) {
    btn.classList.add("active");
    btn.textContent = "Daily Mode ✓";
  } else {
    btn.classList.remove("active");
    btn.textContent = "Daily Mode";
  }
  newGame();
}

function submitGuess(){
  const val = document.getElementById("dungeon-input").value.trim();
  const g = dungeons.find(d => normalize(d.name) === normalize(val));
  if(!g) return;

  remaining = remaining.filter(x => x !== g.name);
  updateList();

  const r = document.createElement("div");
  r.className = "row";

  const portalDiv = document.createElement("div");
  portalDiv.className = "portal";
  if (g.portalImg) {
    portalDiv.innerHTML = `<img src="${g.portalImg}" class="portal-img" alt="${g.name} Portal">`;
  } else {
    portalDiv.innerHTML = `<img src="" class="portal-img" alt="No image">`;
  }
  r.appendChild(portalDiv);

  ["difficulty","boss","treasure","pots","date","size"].forEach((k, i) => {
    const c = document.createElement("div");
    c.className = "cell " + compare(g[k], target[k], k === "pots");
    c.textContent = g[k];
    r.appendChild(c);
    setTimeout(() => c.classList.add("reveal"), i * 70);
  });

  document.getElementById("history").appendChild(r);

  if(g.name === target.name){
    document.getElementById("dungeon-input").disabled = true;
    document.getElementById("message").textContent = "✅ Dungeon Found !";
    document.getElementById("new-game-btn").style.display = "block";
  }

  document.getElementById("dungeon-input").value = "";
}

function updateList(){
  const dl = document.getElementById("dungeon-list");
  dl.innerHTML = "";

  const sorted = remaining
    .map(name => dungeons.find(d => d.name === name))
    .sort((a, b) => a.name.localeCompare(b.name));

  sorted.forEach(d => {
    const o = document.createElement("option");
    o.value = d.name;
    dl.appendChild(o);
  });
}

function applySeed(){
  const s = document.getElementById("seed-input").value.trim();
  manualSeed = s !== "" ? s : null;
  isDailyMode = false; // Désactive le daily si on met un seed manuel
  document.getElementById("daily-btn").classList.remove("active");
  document.getElementById("daily-btn").textContent = "Daily Mode";
  newGame();
}

function newGame(){
  if (isDailyMode) {
    const dailySeed = getDailySeed();
    target = dungeons[dailySeed % dungeons.length];
  } 
  else if(manualSeed){
    const h = hashSeed(manualSeed);
    target = dungeons[h % dungeons.length];
  } 
  else {
    target = dungeons[Math.floor(Math.random() * dungeons.length)];
  }

  remaining = dungeons.map(d => d.name);

  document.getElementById("history").innerHTML = "";
  document.getElementById("message").textContent = "";
  document.getElementById("dungeon-input").disabled = false;
  document.getElementById("new-game-btn").style.display = "none";

  updateList();
}

newGame();
</script>
