<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RotMGDLE – Music Mode</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press Start 2P&display=swap');

:root { --gold:#ffcc00; }

body{
  font-family:'Press Start 2P', system-ui;
  background:linear-gradient(#1a1a2e,#0f0f1f);
  color:#eee;
  text-align:center;
  padding:16px;
}

h1{ color:var(--gold); }

.game-container{
  max-width:800px;
  margin:30px auto;
  background:#16213e;
  border:4px solid var(--gold);
  border-radius:12px;
  padding:30px;
}

.row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin:10px 0;
  flex-wrap:wrap;
}

button{
  font-family:'Press Start 2P';
  padding:10px 14px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button.orange{ background:#f59e0b; }

input{
  padding:10px;
  border:3px solid var(--gold);
  background:#1e2937;
  color:#eee;
  border-radius:8px;
}

#volume-slider{ width:150px; }

#timer{
  margin-top:10px;
  font-size:14px;
  color:#ffcc00;
}

#tries{
  margin-top:8px;
  font-size:12px;
  color:#ccc;
}

#message{
  margin-top:20px;
  color:#22c55e;
  font-size:11px;
}
</style>
</head>

<body>

<h1>ROTMGDLE</h1>
<div>Music Mode</div>

<div class="game-container">

<div class="row">
  <button id="play-btn" onclick="toggleMusic()">▶ PLAY</button>
  🔊
  <input type="range" id="volume-slider" min="0" max="100">
</div>

<div id="timer">00:00.00</div>
<div id="tries">Attempts: 0</div>

<div class="row">
  <input id="music-input" list="music-list" placeholder="Guess the dungeon">
  <button id="guess-btn" onclick="submitGuess()">GUESS</button>
</div>

<div class="row">
  <input id="seed-input" placeholder="Seed">
  <button onclick="applySeed()">Set Seed</button>
</div>

<div class="row">
  <button id="daily-btn" class="orange" onclick="toggleDailyMode()">Daily</button>
  <button onclick="newGame()">Replay</button>
</div>

<datalist id="music-list"></datalist>

<div id="message"></div>

</div>

<script>

// ===== DOM =====
const musicList = document.getElementById("music-list");
const musicInput = document.getElementById("music-input");
const guessBtn = document.getElementById("guess-btn");
const playBtn = document.getElementById("play-btn");
const dailyBtn = document.getElementById("daily-btn");
const seedInput = document.getElementById("seed-input");
const message = document.getElementById("message");
const volumeSlider = document.getElementById("volume-slider");
const timerEl = document.getElementById("timer");
const triesEl = document.getElementById("tries");

// ===== QOL ENTER =====
musicInput.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();

    const val = musicInput.value.toLowerCase();
    const match = musics.find(m => m.name.toLowerCase().includes(val));

    if(match){
      musicInput.value = match.name;
    }

    submitGuess();
  }
});

// ===== MUSICS =====
const musics = [
  { name:"Pirate Cave", file:"Scallywag.mp3" },
  { name:"Forest Maze", file:"Nyooms.mp3" },
  { name:"Spider Den", file:"Crits.mp3" },
  { name:"Snake Pit", file:"Viperidae.mp3" },
  { name:"Sprite World", file:"Arc Sancts.mp3" },
  { name:"Candyland Hunting Grounds", file:"Sacarosa.mp3" },
  { name:"Undead Lair", file:"Mortuus.mp3" },
  { name:"Puppet Master's Theatre", file:"Marionette.mp3" },
  { name:"Toxic Sewers", file:"Virulent.mp3" },
  { name:"Cursed Library", file:"Evert Evert Evert.mp3" },
  { name:"Mad Lab", file:"Wrongworks.mp3" },
  { name:"Abyss of Demons", file:"Belial.mp3" },
  { name:"Manor of the Immortals", file:"Wront.mp3" },
  { name:"Haunted Cemetery", file:"Cadaver.mp3" },
  { name:"The Machine", file:"Mechanical Ambivalence.mp3" },
  { name:"Davy Jone's locker", file:"Suken.mp3" },
  { name:"The Crawling Depths", file:"Chelicerae.mp3" },
  { name:"Deadwater Docks", file:"The Hempen Jig.mp3" },
  { name:"Parasite Chambers", file:"Mist'enuse.mp3" },
  { name:"Mountain Temple", file:"Daimyo.mp3" },
  { name:"Lair of Draconis", file:"Draconis.mp3" },
  { name:"High Tech Terror", file:"BOUNDARY BREAK.mp3" },
  { name:"Ice Citadel", file:"Long Time Cold Forgotten.mp3" },
  { name:"Moonlight Village", file:"Moonlight Village.mp3" },
  { name:"The Nest", file:"Matriarchy.mp3" },
  { name:"Spectral Penitentiary", file:"Waltz of Eternity.mp3" },
  { name:"Kogbold Steamworks", file:"Mechanical Machinations.mp3" },
  { name:"Lost halls", file:"Lost halls.mp3" },
  { name:"The Shatters", file:"The Shatters.mp3" },
  { name:"Oryx's Sanctuary", file:"Apostasy.mp3" }
];

// ===== HASH =====
function hashSeed(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h=Math.imul(31,h)+str.charCodeAt(i)|0;
  }
  return Math.abs(h);
}

// ===== DAILY =====
function getDailySeed(){
  let s = localStorage.getItem("rotmgdle_music_daily_seed");
  if(!s){
    s = Math.floor(Math.random()*1e9).toString();
    localStorage.setItem("rotmgdle_music_daily_seed", s);
  }
  return hashSeed(s);
}

// ===== STATE =====
let target, remaining=[];
let audio=new Audio();
let isPlaying=false;
let manualSeed=null;
let daily=false;
let tries=0;

// ===== TIMER =====
let startTime=0, elapsed=0, timerInterval=null, running=false;

function startTimer(){
  if(running) return;
  running=true;
  startTime = Date.now() - elapsed;

  timerInterval=setInterval(()=>{
    elapsed = Date.now()-startTime;
    updateTimer();
  },50);
}

function stopTimer(){
  running=false;
  clearInterval(timerInterval);
}

function resetTimer(){
  running=false;
  clearInterval(timerInterval);
  elapsed=0;
  updateTimer();
}

function updateTimer(){
  let m=Math.floor(elapsed/60000);
  let s=Math.floor((elapsed%60000)/1000);
  let ms=Math.floor((elapsed%1000)/10);

  timerEl.textContent =
    String(m).padStart(2,"0")+":"+
    String(s).padStart(2,"0")+"."+
    String(ms).padStart(2,"0");
}

// ===== PLAY =====
function toggleMusic(){
  if(!audio.src){
    audio = new Audio(target.file);
    audio.volume = volumeSlider.value/100;
  }

  if(isPlaying){
    audio.pause();
    isPlaying=false;
  } else {
    audio.play();
    isPlaying=true;
    startTimer();
    musicInput.disabled=false;
    guessBtn.disabled=false;
  }

  playBtn.textContent = isPlaying ? "⏸ PAUSE" : "▶ PLAY";
}

// ===== LIST =====
function updateList(){
  musicList.innerHTML="";
  remaining.forEach(n=>{
    const o=document.createElement("option");
    o.value=n;
    musicList.appendChild(o);
  });
}

// ===== GAME =====
function newGame(){

 playBtn.textContent = "▶ PLAY";
  const s =
    daily ? getDailySeed() :
    manualSeed ? hashSeed(manualSeed) :
    Math.floor(Math.random()*1e9);

  target = musics[s % musics.length];

  remaining = musics.map(m=>m.name);
  updateList();

  tries=0;
  triesEl.textContent="Attempts: 0";

  audio.pause();
  audio=new Audio();
  isPlaying=false;

  resetTimer();

  message.textContent="";
  musicInput.disabled=true;
  guessBtn.disabled=true;
}

// ===== GUESS =====
function submitGuess(){


  const val = musicInput.value.trim();
  if(!val) return;

  tries++;
  triesEl.textContent = "Attempts: " + tries;

  if(val.toLowerCase()===target.name.toLowerCase()){
message.innerHTML =
  "✅ FOUND!<br><br>" +
  target.name + "<br>" +
  target.file.replace(".mp3", "") + "<br><br>" +
  "Attempts: " + tries;

    stopTimer();
  } else {
    message.textContent="❌ Try again";
    remaining = remaining.filter(n=>n!==val);
    updateList();
  }

  musicInput.value="";
}

// ===== SEED =====
function applySeed(){
  manualSeed = seedInput.value.trim();
  daily=false;
  dailyBtn.classList.remove("active");
  newGame();
}

function toggleDailyMode(){
  daily=!daily;
  manualSeed=null;
  dailyBtn.classList.toggle("active", daily);
  newGame();
}

// ===== VOLUME =====
volumeSlider.value = localStorage.getItem("volume") || 50;
volumeSlider.oninput = (e)=>{
  audio.volume = e.target.value/100;
  localStorage.setItem("volume", e.target.value);
};

newGame();

</script>
</body>
</html>
