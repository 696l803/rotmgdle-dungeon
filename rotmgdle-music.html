<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RotMGDLE – Music Mode</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press Start 2P&display=swap');

:root { --gold:#ffcc00; }

body{
  font-family:'Press Start 2P', system-ui;
  background:linear-gradient(#1a1a2e,#0f0f1f);
  color:#eee;
  text-align:center;
  padding:16px;
}

h1{ color:var(--gold); }

.game-container{
  max-width:800px;
  margin:30px auto;
  background:#16213e;
  border:4px solid var(--gold);
  border-radius:12px;
  padding:30px;
}

button{
  font-family:'Press Start 2P';
  padding:12px;
  margin:6px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

button.orange{ background:#f59e0b; }
button.active{ background:#22c55e !important; }

#daily-btn{ width:180px; }

input{
  padding:10px;
  border:3px solid var(--gold);
  background:#1e2937;
  color:#eee;
  border-radius:8px;
  width:260px;
}

.volume-container{
  margin:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#volume-slider{
  width:200px;
  accent-color:#22c55e;
}

#timer{
  margin-top:10px;
  font-size:14px;
  color:#ffcc00;
}

#message{ margin-top:20px; }
</style>
</head>

<body>

<h1>ROTMGDLE</h1>
<div>Music Mode</div>

<div class="game-container">

<button id="play-btn" onclick="toggleMusic()">▶ PLAY</button>

<div class="volume-container">
  🔊
  <input type="range" id="volume-slider" min="0" max="100">
</div>

<div id="timer">00:00.00</div>

<input id="music-input" list="music-list" placeholder="Guess the music">
<button id="guess-btn" onclick="submitGuess()">GUESS</button>

<br>

<button id="daily-btn" class="orange" onclick="toggleDaily()">Daily Mode</button>
<button onclick="newGame()">Play Again</button>

<datalist id="music-list"></datalist>

<div id="message"></div>

</div>

<script>

// ===== MUSICS =====
const musics = [
  { name:"Pirate Cave", file:"Scallywag.mp3" },
  { name:"Forest Maze", file:"Nyooms.mp3" },
  { name:"Spider Den", file:"Crits.mp3" },
  { name:"Snake Pit", file:"Viperidae.mp3" },
  { name:"Sprite World", file:"Arc Sancts.mp3" },
  { name:"Candyland Hunting Grounds", file:"Sacarosa.mp3" },
  { name:"Undead Lair", file:"Mortuus.mp3" },
  { name:"Puppet Master's Theatre", file:"Marionette.mp3" },
  { name:"Toxic Sewers", file:"Virulent.mp3" },
  { name:"Cursed Library", file:"Evert Evert Evert.mp3" },
  { name:"Mad Lab", file:"Wrongworks.mp3" },
  { name:"Abyss of Demons", file:"Belial.mp3" },
  { name:"Manor of the Immortals", file:"Wront.mp3" },
  { name:"Haunted Cemetery", file:"Cadaver.mp3" },
  { name:"The Machine", file:"Mechanical Ambivalence.mp3" },
  { name:"Davy Jone's locker", file:"Suken.mp3" },
  { name:"The Crawling Depths", file:"Chelicerae.mp3" },
  { name:"Deadwater Docks", file:"The Hempen Jig.mp3" },
  { name:"Parasite Chambers", file:"Mist'enuse.mp3" },
  { name:"Mountain Temple", file:"Daimyo.mp3" },
  { name:"Lair of Draconis", file:"Draconis.mp3" },
  { name:"High Tech Terror", file:"BOUNDARY BREAK.mp3" },
  { name:"Ice Citadel", file:"Long Time Cold - Forgotten.mp3" },
  { name:"Moonlight Village", file:"Moonlight Village.mp3" },
  { name:"The Nest", file:"Matriarchy.mp3" },
  { name:"Spectral Penitentiary", file:"Waltz of Eternity.mp3" },
  { name:"Kogbold Steamworks", file:"Mechanical Machinations.mp3" },
  { name:"Lost halls", file:"Lost halls.mp3" },
  { name:"The Shatters", file:"The Shatters.mp3" },
  { name:"Oryx's Sanctuary", file:"Apostasy.mp3" }

];

// ===== HASH / DAILY =====
function hash(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h=Math.imul(31,h)+str.charCodeAt(i)|0;
  }
  return Math.abs(h);
}

function getDailySeed(){
  const d=new Date();
  return hash(d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate());
}

// ===== STATE =====
let target;
let remaining = [];
let audio = new Audio();
let isPlaying=false;
let isDaily=false;

// ===== TIMER (CONTINUE TOUJOURS) =====
let startTime = 0;
let elapsed = 0;
let timerInterval = null;
let running = false;

function startTimer(){
  if(running) return;

  running = true;
  startTime = Date.now();

  timerInterval = setInterval(updateTimer, 50);
}

function stopTimer(){
  running = false;
  clearInterval(timerInterval);
}

function resetTimer(){
  running = false;
  clearInterval(timerInterval);
  elapsed = 0;
  updateTimer();
}

function updateTimer(){
  if(running){
    elapsed = Date.now() - startTime;
  }

  let m = Math.floor(elapsed / 60000);
  let s = Math.floor((elapsed % 60000)/1000);
  let ms = Math.floor((elapsed % 1000)/10);

  document.getElementById("timer").textContent =
    String(m).padStart(2,"0")+":"+
    String(s).padStart(2,"0")+"."+
    String(ms).padStart(2,"0");
}

// ===== VOLUME =====
const slider=document.getElementById("volume-slider");

slider.value = localStorage.getItem("volume") || 50;
audio.volume = slider.value/100;

slider.oninput = (e)=>{
  audio.volume = e.target.value/100;
  localStorage.setItem("volume", e.target.value);
};

// ===== PLAY (TIMER = NE S'ARRETE PLUS) =====
function toggleMusic(){

  if(!audio.src){
    audio = new Audio(target.file);
    audio.volume = slider.value/100;

    audio.onended = ()=>{
      isPlaying=false;
      updatePlayBtn();
    };
  }

  if(isPlaying){
    audio.pause();
    isPlaying=false;
    // ❌ PAS DE stopTimer()

  } else {
    audio.play();
    isPlaying=true;

    // ✅ démarre UNE SEULE FOIS
    if(!running){
      startTimer();
    }
  }

  updatePlayBtn();

  document.getElementById("music-input").disabled = false;
  document.getElementById("guess-btn").disabled = false;
}

function updatePlayBtn(){
  document.getElementById("play-btn").textContent =
    isPlaying ? "⏸ PAUSE" : "▶ PLAY";
}

// ===== LIST =====
function updateList(){
  const dl=document.getElementById("music-list");
  dl.innerHTML="";
  remaining.forEach(n=>{
    const o=document.createElement("option");
    o.value=n;
    dl.appendChild(o);
  });
}

// ===== NEW GAME =====
function newGame(){

  if(isDaily){
    target = musics[getDailySeed()%musics.length];
  } else {
    target = musics[Math.floor(Math.random()*musics.length)];
  }

  remaining = musics.map(m=>m.name);
  updateList();

  audio.pause();
  audio=new Audio();
  isPlaying=false;
  updatePlayBtn();

  resetTimer();

  document.getElementById("message").textContent="";
  document.getElementById("music-input").disabled = true;
  document.getElementById("guess-btn").disabled = true;
}

// ===== DAILY =====
function toggleDaily(){

  isDaily=!isDaily;

  const btn = document.getElementById("daily-btn");
  btn.classList.toggle("active", isDaily);

  newGame();
}

// ===== GUESS =====
function submitGuess(){

  const input = document.getElementById("music-input");
  const val = input.value.trim();
  if(!val) return;

  if(val.toLowerCase()===target.name.toLowerCase()){

    document.getElementById("message").textContent="✅ Correct!";
    stopTimer(); // ✅ stop uniquement ici

    input.disabled=true;
    document.getElementById("guess-btn").disabled=true;

  } else {

    document.getElementById("message").textContent="❌ Try again";
    remaining = remaining.filter(n=>n!==val);
    updateList();
  }

  input.value="";
}

// ===== INIT =====
newGame();

</script>

</body>
</html>
