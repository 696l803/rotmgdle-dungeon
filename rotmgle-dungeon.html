<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RotMGDLE – Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root { --gold:#ffcc00; }
* { box-sizing:border-box; }

body{
  font-family:'Press Start 2P', system-ui;
  background:linear-gradient(#1a1a2e,#0f0f1f);
  color:#eee;
  margin:0;
  padding:16px;
  text-align:center;
}

h1{
  color:var(--gold);
  text-shadow:0 0 15px var(--gold);
}

.subtitle{color:#aaa;margin-bottom:20px;}

.game-container{
  max-width:1400px;
  margin:auto;
  background:#16213e;
  border:4px solid var(--gold);
  border-radius:12px;
  padding:20px;
}

/* Harmonisation + décalage */
.grid,.row{
  display:grid;
  grid-template-columns:140px 14% 10% 14% 22% 12% 12%;
  gap:10px;
}

.header{
  background:#0f3460;
  color:var(--gold);
  padding:12px 10px 12px 18px;
  border:2px solid #444;
  letter-spacing:1.5px;
  font-size:12px;
  text-shadow:0 0 4px #000;
  text-align:left;
}

.row > div {
  padding-left:12px;
  text-align:left;
}

.row{margin:6px 0;}

.portal{
  background:#1e2937;
  border:3px solid #555;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding-left:12px;
}

.portal-img {
  width: 48px;
  height: 48px;
  image-rendering: pixelated;
}

.cell{
  background:#1e2937;
  border:3px solid #555;
  display:flex;
  justify-content:flex-start;
  align-items:center;
  padding-left:12px;
  color:#fff;
  transform:scaleY(0);
  opacity:0;
}

.cell.reveal{animation:flip .4s forwards;}
@keyframes flip{to{transform:scaleY(1);opacity:1;}}

.green{background:#22c55e;color:#000;}
.gray{background:#64748b;}
.orange{background:#f59e0b;color:#000;}

.arrow-up::after{content:" ▲";color:#22c55e;}
.arrow-down::after{content:" ▼";color:#ef4444;}

input{
  flex:1;
  padding:14px;
  border:3px solid var(--gold);
  background:#1e2937;
  color:#eee;
  border-radius:8px;
}

button{
  font-family:'Press Start 2P';
  padding:14px 20px;
  background:#22c55e;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>ROTMGDLE</h1>
<div class="subtitle">Dungeon Mode</div>

<div class="game-container">

<div class="grid">
  <div class="header">PORTAL</div>
  <div class="header">DIFF</div>
  <div class="header">BOSS</div>
  <div class="header">TREASURE</div>
  <div class="header">POTS</div>
  <div class="header">DATE</div>
  <div class="header">SIZE</div>
</div>

<div id="history"></div>

<div style="display:flex;gap:10px;margin-top:15px;">
  <input id="dungeon-input" list="dungeon-list">
  <button onclick="submitGuess()">GUESS</button>
</div>

<div style="margin-top:15px;">
  <input id="seed-input" placeholder="Enter seed (optional)" style="width:80%;padding:10px;">
  <button onclick="applySeed()" style="margin-top:10px;">Set Seed</button>
</div>

<datalist id="dungeon-list"></datalist>

<div id="message" style="margin-top:15px;color:#22c55e;"></div>
<button id="new-game-btn" style="display:none;margin-top:15px;" onclick="newGame()">REJOUER</button>

</div>

<script>
function normalize(v){return v.toLowerCase().replace(/’/g,"'").trim();}

/* ✅ Génération auto des URLs des portails */
function getPortalURL(name){
  const clean = name.replace(/'/g, "%27")
                    .replace(/ /g, "%20")
                    .trim();
  return `https://static.drips.pw/rotmg/wiki/Environment/Portals/${clean}%20Portal.png`;
}

function hashSeed(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(31,h) + str.charCodeAt(i) | 0;
  }
  return Math.abs(h);
}

const sizeOrder = { "Arena":1, "Short":2, "Medium":3, "Long":4 };

function compare(a,b,isPots=false){
  const A=normalize(a), B=normalize(b);

  if(!isNaN(A) && !isNaN(B)){
    if(Number(A)===Number(B)) return "green";
    return Number(A) < Number(B) ? "arrow-up" : "arrow-down";
  }

  if(sizeOrder[a] && sizeOrder[b]){
    if(sizeOrder[a]===sizeOrder[b]) return "green";
    return sizeOrder[a] < sizeOrder[b] ? "arrow-up" : "arrow-down";
  }

  if(isPots){
    if(A===B) return "green";
    const la=A.split(",").map(s=>s.trim());
    const lb=B.split(",").map(s=>s.trim());
    return la.some(p=>lb.includes(p)) ? "orange" : "gray";
  }

  return A===B ? "green" : "gray";
}

let target, remaining, manualSeed=null;

const dungeons = [{name:"Pirate Cave",difficulty:"1",boss:"1",treasure:"No",pots:"None",date:"2010",size:"Short"},
{name:"Forest Maze",difficulty:"1",boss:"1",treasure:"No",pots:"None",date:"2013",size:"Short"},
{name:"Spider Den",difficulty:"1.5",boss:"1",treasure:"No",pots:"None",date:"2010",size:"Short"},
{name:"Forbidden Jungle",difficulty:"1.5",boss:"1",treasure:"No",pots:"None",date:"2011",size:"Short"},

{name:"The Hive",difficulty:"2",boss:"1",treasure:"No",pots:"DEX",date:"2016",size:"Short"},

{name:"Snake Pit",difficulty:"2.5",boss:"1",treasure:"Yes",pots:"SPD",date:"2010",size:"Short"},
{name:"Sprite World",difficulty:"2.5",boss:"1",treasure:"No",pots:"DEX, DEF, ATK",date:"2010",size:"Short"},
{name:"Cave of a Thousand Treasures",difficulty:"2.5",boss:"1",treasure:"No",pots:"All minor",date:"2011",size:"Short"},

{name:"Candyland Hunting Grounds",difficulty:"3.5",boss:"6",treasure:"No",pots:"DEF, ATK, WIS",date:"2014",size:"Short"},

{name:"Magic Woods",difficulty:"3",boss:"1",treasure:"No",pots:"SPD, DEX",date:"2015",size:"Medium"},
{name:"Ancient Ruins",difficulty:"3",boss:"1",treasure:"Yes",pots:"All minor",date:"2012",size:"Medium"},

{name:"Undead Lair",difficulty:"3.5",boss:"1",treasure:"Yes",pots:"WIS",date:"2010",size:"Short"},
{name:"Puppet Master's Theatre",difficulty:"4",boss:"1",treasure:"Yes",pots:"ATK",date:"2014",size:"Medium"},
{name:"Toxic Sewers",difficulty:"4",boss:"1",treasure:"Yes",pots:"DEF",date:"2016",size:"Medium"},
{name:"Abyss of Demons",difficulty:"4",boss:"1",treasure:"Yes",pots:"VIT, DEF",date:"2011",size:"Medium"},
{name:"Manor of the Immortals",difficulty:"4",boss:"1",treasure:"Yes",pots:"ATK",date:"2012",size:"Medium"},
{name:"Mad Lab",difficulty:"4",boss:"1",treasure:"Yes",pots:"WIS, DEF",date:"2012",size:"Medium"},
{name:"Cursed Library",difficulty:"4",boss:"1",treasure:"Yes",pots:"WIS, VIT, ATK",date:"2019",size:"Medium"},

{name:"Haunted Cemetery",difficulty:"4.5",boss:"3",treasure:"No",pots:"All minor",date:"2013",size:"Arena"},
{name:"The Machine",difficulty:"4.5",boss:"1",treasure:"No",pots:"None",date:"2016",size:"Arena"},

{name:"Davy Jones' Locker",difficulty:"5",boss:"1",treasure:"Yes",pots:"MANA, ATK, WIS",date:"2013",size:"Long"},
{name:"Ocean Trench",difficulty:"5",boss:"1",treasure:"No",pots:"MANA",date:"2011",size:"Medium"},

{name:"Puppet Master's Encore",difficulty:"5.5",boss:"1",treasure:"No",pots:"ATK, MANA, DEF",date:"2020",size:"Arena"},

{name:"Parasite Chambers",difficulty:"5.5",boss:"1",treasure:"Yes",pots:"MANA",date:"2017",size:"Short"},
{name:"Deadwater Docks",difficulty:"5.5",boss:"1",treasure:"Yes",pots:"GSPD, GDEX",date:"2013",size:"Medium"},
{name:"Cnidarian Reef",difficulty:"5.5",boss:"1",treasure:"No",pots:"GDEF, GATK, MANA",date:"2017",size:"Arena"},

{name:"Mountain Temple",difficulty:"6",boss:"1",treasure:"Yes",pots:"GDEF, All minor",date:"2017",size:"Medium"},

{name:"The Crawling Depths",difficulty:"5.5",boss:"1",treasure:"Yes",pots:"GDEF, GWIS, MANA",date:"2015",size:"Medium"},
{name:"Woodland Labyrinth",difficulty:"5.5",boss:"1",treasure:"Yes",pots:"GVIT, GATK, LIFE",date:"2014",size:"Medium"},

{name:"Secluded Thicket",difficulty:"6.5",boss:"3",treasure:"No",pots:"ATK, DEF, LIFE, MANA",date:"2018",size:"Arena"},

{name:"Lair of Draconis",difficulty:"6",boss:"5",treasure:"No",
 pots:"GSPD, GATK, GDEF, GDEX, GVIT, GWIS, GM",date:"2013",size:"Arena"},

{name:"Tomb of the Ancients",difficulty:"6",boss:"3",treasure:"Yes",pots:"LIFE",date:"2011",size:"Long"},

{name:"Lair of Shaitan",difficulty:"6",boss:"1",treasure:"No",pots:"ATK, VIT, LIFE",date:"2013",size:"Arena"},

{name:"The Nest",difficulty:"7",boss:"1",treasure:"Yes",pots:"GL, GDEX",date:"2019",size:"Long"},
{name:"Plagued Nest",difficulty:"8.5",boss:"1",treasure:"Yes",pots:"GLIFE, GDEX",date:"2025",size:"Long"},

{name:"Cultist Hideout",difficulty:"7",boss:"1",treasure:"No",pots:"LIFE, MANA",date:"2017",size:"Long"},

{name:"Fungal Cavern",difficulty:"7.5",boss:"1",treasure:"No",
 pots:"HP, GSPD, GDEX, GDEF, GATK, GVIT, GWIS",date:"2020",size:"Long"},

{name:"Crystal Cavern",difficulty:"7.5",boss:"1",treasure:"No",
 pots:"HP, GSPD, GDEX, GDEF, GATK, GVIT, GWIS",date:"2020",size:"Long"},

{name:"Spectral Penitentiary",difficulty:"8",boss:"2",treasure:"No",
 pots:"GDEF, GMP, SPD, VIT, WIS, ATK, MP",date:"2021",size:"Long"},

{name:"Lost Halls",difficulty:"8",boss:"2",treasure:"Yes",
 pots:"ATK, DEF, HP, MP",date:"2017",size:"Long"},

{name:"Sulfurous Wetlands",difficulty:"6",boss:"1",treasure:"Yes",
 pots:"MANA, GSPD, GDEX, GDEF, GATK, GVIT, GWIS",date:"2025",size:"Long"},

{name:"The Third Dimension",difficulty:"6",boss:"2",treasure:"Yes",
 pots:"GWIS, GATK, MP, HP, VIT, DEF",date:"2025",size:"Long"},

{name:"The Void",difficulty:"8.5",boss:"1",treasure:"No",
 pots:"HP, MP",date:"2017",size:"Arena"},

{name:"Ice Citadel",difficulty:"7",boss:"1",treasure:"No",
 pots:"LIFE, GM, GDEF, GWIS, GSPD",date:"2025",size:"Long"},

{name:"Kogbold Steamworks",difficulty:"8",boss:"2",treasure:"No",
 pots:"GSPD, GATK, GDEF, GDEX, GVIT, GWIS",date:"2022",size:"Long"},

{name:"Advanced Kogbold Steamworks",difficulty:"10",boss:"2",treasure:"No",
 pots:"GSPD, GATK, GDEF, GDEX, GVIT, GWIS",date:"2023",size:"Long"},

{name:"Oryx's Sanctuary",difficulty:"9.5",boss:"2",treasure:"No",
 pots:"GL, GM",date:"2019",size:"Medium"},

{name:"The Shatters",difficulty:"10",boss:"3",treasure:"No",
 pots:"GATK, GDEF, GMP, GWIS, GHP, GVIT",date:"2021",size:"Long"},

{name:"High Tech Terror",difficulty:"6.5",boss:"1",treasure:"No",
 pots:"GWIS, MP, HP",date:"2020",size:"Arena"},

{name:"Moonlight Village",difficulty:"9",boss:"3",treasure:"No",
 pots:"GLIFE, GVIT, GWIS",date:"2025",size:"Arena"},

{name:"The Tavern",difficulty:"5.5",boss:"3",treasure:"No",
 pots:"GVIT, VIT, MANA",date:"2023",size:"Arena"}
];
function updateList(){
  const dl=document.getElementById("dungeon-list");
  dl.innerHTML="";

  const sorted = remaining
    .map(name => dungeons.find(d=>d.name===name))
    .sort((a,b)=>Number(a.difficulty) - Number(b.difficulty));

  sorted.forEach(d=>{
    const o=document.createElement("option");
    o.value=d.name;
    dl.appendChild(o);
  });
}

function applySeed(){
  const s=document.getElementById("seed-input").value.trim();
  manualSeed = s !== "" ? s : null;
  newGame();
}

function submitGuess(){
  const val=document.getElementById("dungeon-input").value;
  const g=dungeons.find(d=>normalize(d.name)===normalize(val));
  if(!g) return;

  remaining = remaining.filter(x=>x!==g.name);
  updateList();

  const r=document.createElement("div");
  r.className="row";

  /* ✅ Portal image from drips.pw */
  r.innerHTML = `
    <div class="portal">
      <img src="${getPortalURL(g.name)}" class="portal-img">
    </div>
  `;

  ["difficulty","boss","treasure","pots","date","size"].forEach((k,i)=>{
    const c=document.createElement("div");
    c.className="cell " + compare(g[k], target[k], k==="pots");
    c.textContent = g[k];
    r.appendChild(c);
    setTimeout(()=>c.classList.add("reveal"), i*70);
  });

  document.getElementById("history").appendChild(r);

  if(g.name === target.name){
    document.getElementById("dungeon-input").disabled = true;
    document.getElementById("message").textContent = "✅ Donjon trouvé !";
    document.getElementById("new-game-btn").style.display = "block";
  }

  document.getElementById("dungeon-input").value = "";
}

function newGame(){

  if(manualSeed){
    const h = hashSeed(manualSeed);
    target = dungeons[h % dungeons.length];
  } else {
    target = dungeons[Math.floor(Math.random()*dungeons.length)];
  }

  remaining = dungeons.map(d=>d.name);

  document.getElementById("history").innerHTML = "";
  document.getElementById("message").textContent = "";
  document.getElementById("dungeon-input").disabled = false;
  document.getElementById("new-game-btn").style.display = "none";

  updateList();
}

newGame();
</script>

</body>
</html>
